name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check skill_router/
      - run: uv run ruff format --check skill_router/

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run python -m compileall skill_router/
      - run: uv run python -c "import ast; [ast.parse(open(f).read()) for f in ['skill_router/__init__.py', 'skill_router/registry.py', 'skill_router/search.py', 'skill_router/cli.py']]"

  test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -v --cov=skill_router --cov-report=term
