name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check skill_router/ tests/
      - run: uv run ruff format --check skill_router/ tests/

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run python -m compileall skill_router/
      - run: uv run python -c "import ast; [ast.parse(open(f).read()) for f in ['skill_router/__init__.py', 'skill_router/registry.py', 'skill_router/search.py', 'skill_router/cli.py']]"

  test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -v --cov=skill_router --cov-report=term

  type-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run mypy skill_router/ || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv build
      - name: Verify bundled skill is in wheel
        run: |
          python - <<'PY'
          import zipfile, pathlib, sys
          wheel = next(pathlib.Path("dist").glob("*.whl"))
          names = zipfile.ZipFile(wheel).namelist()
          if not any("skill_router/skills/skill-router/SKILL.md" in n for n in names):
              print("Bundled SKILL.md missing from wheel!")
              sys.exit(1)
          print("Bundled SKILL.md found in wheel.")
          PY
