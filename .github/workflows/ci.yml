name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: uv pip compile pyproject.toml -o requirements.txt
      - run: uv pip install -r requirements.txt
      - run: ruff check skill_router/

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.12"
      - run: python -m compileall skill_router/
      - run: python -c "import ast; [ast.parse(open(f).read()) for f in ['skill_router/__init__.py', 'skill_router/registry.py', 'skill_router/search.py', 'skill_router/cli.py']]"
